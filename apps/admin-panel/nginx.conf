server {
    listen 3030;
    server_name localhost;

    location /admin {
        alias /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /admin/index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
